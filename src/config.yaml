site:
  name: Biblys
  site: 'https://biblys.org'
  base: '/'
  trailingSlash: false

#  googleSiteVerificationId: orcPxI47GSa-cRvY11tUe6iGg2IO_RPvnA1q95iEM3M

# Default SEO metadata
metadata:
  title:
    default: Biblys, le logiciel livre pour créer des boutique de livres en ligne
    template: '%s · Biblys'
  description: Utilisée par des librairies et des maisons indépendantes, Biblys est un logiciel libre et gratuit pour vendre facilement des livres papier et numérique sur le web.
  robots:
    index: true
    follow: true
  openGraph:
    site_name: Biblys
    images:
    #      - url: '~/assets/images/default.png'
    #        width: 1200
    #        height: 628
    type: website
  twitter:
    handle: '@biblys'
    site: '@biblys'
    cardType: summary_large_image

i18n:
  language: fr
  textDirection: ltr

apps:
  blog:
    isEnabled: true
    postsPerPage: 10

    post:
      isEnabled: true
      permalink: '/%slug%'
      robots:
        index: true

    list:
      isEnabled: true
      pathname: 'blog'
      robots:
        index: true

    category:
      isEnabled: false

    tag:
      isEnabled: false

    isRelatedPostsEnabled: false

analytics:
  vendors:
    googleAnalytics:
      id: null # or "G-XXXXXXXXXX"

ui:
  theme: 'system' # Values: "system" | "light" | "dark" | "light:only" | "dark:only"
